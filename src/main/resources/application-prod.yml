spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    name: adminBase
    url: ${PROD_DATASOURCE_URL}
    username: ${PROD_DATASOURCE_USERNAME}
    password: ${PROD_DATASOURCE_PASSWORD}
  data:
    redis:
      database: ${PROD_REDIS_DATABASE:0}
      host: ${PROD_REDIS_HOST}
      port: ${PROD_REDIS_PORT:6379}
      password: ${PROD_REDIS_PASSWORD:}
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
# 生产环境 sysconfig：关键路径（uploadPath/downloadPath/localStore）不提供默认值，
# 必须通过 PROD_* 环境变量显式配置；captchaType/resourcePrefix 有生产默认值
sysconfig:
  captchaType: ${PROD_CAPTCHA_TYPE:math}
  uploadPath: ${PROD_UPLOAD_PATH}
  downloadPath: ${PROD_DOWNLOAD_PATH}
  localStore: ${PROD_LOCAL_STORE}
  resourcePrefix: ${PROD_RESOURCE_PREFIX:/profile}