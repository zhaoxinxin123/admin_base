spring:
  application:
    name: admin
  profiles:
    active: test
  servlet:
    multipart:
      max-request-size: 30MB
      max-file-size: 30MB
  main:
    allow-bean-definition-overriding: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
server:
  port: 9999
  servlet:
    context-path: /admin-api
jwt:
  tokenHead: Bearer
  tokenHeader: Authorization
  tokenPrefix: Bearer
  # JJWT 0.12 要求 HS256 密钥 ≥ 256 bits（32 字节）。
  # 生产环境通过 JWT_SECRET 环境变量提供 Base64 编码的密钥。
  # 以下默认值为 256-bit 测试密钥，仅限本地/开发环境使用。
  secret: ${JWT_SECRET:YnJvLXN0cmluZy1hZG1pbi1iYXNlLWp3dC1zZWNyZXQ=}
  expiration: ${JWT_EXPIRATION_SECONDS:7200}

