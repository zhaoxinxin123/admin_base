spring:
  application:
    name: admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}
  servlet:
    multipart:
      max-request-size: 30MB
      max-file-size: 30MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
server:
  port: ${SERVER_PORT:9999}
  servlet:
    context-path: /admin-api
# 认证模式：jwt 为可执行模式，oauth2 为 Phase 1 预留结构
admin:
  auth:
    mode: ${ADMIN_AUTH_MODE:jwt}
  oauth2:
    issuer-uri: ${ADMIN_OAUTH2_ISSUER_URI:}
    audience: ${ADMIN_OAUTH2_AUDIENCE:admin-api}
    username-claim: ${ADMIN_OAUTH2_USERNAME_CLAIM:preferred_username}
    authorities-claim: ${ADMIN_OAUTH2_AUTHORITIES_CLAIM:authorities}
jwt:
  tokenHead: Bearer
  tokenHeader: Authorization
  tokenPrefix: Bearer
  # JJWT 0.12 要求 HS256 密钥 ≥ 256 bits（32 字节）。
  # 生产环境通过 JWT_SECRET 环境变量提供 Base64 编码的密钥。
  # 以下默认值为 256-bit 测试密钥，仅限本地/开发环境使用。
  secret: ${JWT_SECRET:YnJvLXN0cmluZy1hZG1pbi1iYXNlLWp3dC1zZWNyZXQ=}
  expiration: ${JWT_EXPIRATION_SECONDS:7200}
