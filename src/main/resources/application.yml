spring:
  application:
    name: admin
  profiles:
    active: test
  servlet:
    multipart:
      max-request-size: 30MB
      max-file-size: 30MB
  main:
    allow-bean-definition-overriding: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
server:
  port: 9999
  servlet:
    context-path: /admin-api
jwt:
  tokenHead: Bearer
  tokenHeader: Authorization
  tokenPrefix: Bearer
  # JJWT 0.12 requires HS256 keys ≥ 256 bits (32 bytes).
  # Provide a Base64-encoded key via JWT_SECRET env var in production.
  # Default below is a 256-bit key for local/dev use only.
  secret: ${JWT_SECRET:YnJvLXN0cmluZy1hZG1pbi1iYXNlLWp3dC1zZWNyZXQ=}
  expiration: ${JWT_EXPIRATION_SECONDS:7200}

