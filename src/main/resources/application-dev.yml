spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    name: adminBase
    url: ${DEV_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/admin_base?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false}
    username: ${DEV_DATASOURCE_USERNAME:root}
    password: ${DEV_DATASOURCE_PASSWORD:}
  data:
    redis:
      database: ${DEV_REDIS_DATABASE:0}
      host: ${DEV_REDIS_HOST:127.0.0.1}
      port: ${DEV_REDIS_PORT:6379}
      password: ${DEV_REDIS_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
admin:
  oauth2:
    issuer-uri: ${ADMIN_OAUTH2_ISSUER_URI:}
    audience: ${ADMIN_OAUTH2_AUDIENCE:admin-api}
    username-claim: ${ADMIN_OAUTH2_USERNAME_CLAIM:preferred_username}
    authorities-claim: ${ADMIN_OAUTH2_AUTHORITIES_CLAIM:authorities}
sysconfig:
  captchaType: math
  uploadPath: /home/uploadPath
  downloadPath: /home/download
  localStore: /home/local
  resourcePrefix: /profile
